<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4e8ef7"/>
      <stop offset="100%" stop-color="#e8637a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Barbell bar -->
  <rect x="108" y="236" width="296" height="40" rx="20" fill="url(#accent)"/>
  <!-- Left plate outer -->
  <rect x="68" y="168" width="64" height="176" rx="16" fill="url(#accent)"/>
  <!-- Left plate inner -->
  <rect x="86" y="188" width="28" height="136" rx="8" fill="#1a1a2e" opacity="0.35"/>
  <!-- Right plate outer -->
  <rect x="380" y="168" width="64" height="176" rx="16" fill="url(#accent)"/>
  <!-- Right plate inner -->
  <rect x="398" y="188" width="28" height="136" rx="8" fill="#1a1a2e" opacity="0.35"/>
  <!-- Left small plate -->
  <rect x="140" y="196" width="40" height="120" rx="10" fill="url(#accent)" opacity="0.75"/>
  <!-- Right small plate -->
  <rect x="332" y="196" width="40" height="120" rx="10" fill="url(#accent)" opacity="0.75"/>
</svg>
