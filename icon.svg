<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0c0e"/>
      <stop offset="100%" stop-color="#16161a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4e8ef7"/>
      <stop offset="100%" stop-color="#e8637a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Barbell -->
  <rect x="100" y="232" width="312" height="48" rx="24" fill="url(#accent)"/>
  <!-- Left plate outer -->
  <rect x="72" y="176" width="56" height="160" rx="16" fill="url(#accent)"/>
  <!-- Left plate inner -->
  <rect x="108" y="196" width="36" height="120" rx="10" fill="#0c0c0e" opacity="0.3"/>
  <!-- Right plate outer -->
  <rect x="384" y="176" width="56" height="160" rx="16" fill="url(#accent)"/>
  <!-- Right plate inner -->
  <rect x="368" y="196" width="36" height="120" rx="10" fill="#0c0c0e" opacity="0.3"/>
  <!-- Left small plate -->
  <rect x="136" y="204" width="32" height="104" rx="10" fill="url(#accent)" opacity="0.7"/>
  <!-- Right small plate -->
  <rect x="344" y="204" width="32" height="104" rx="10" fill="url(#accent)" opacity="0.7"/>
</svg>
