<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gym" />
    <meta name="theme-color" content="#0c0c0e" />
    <title>Programme Musculation</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0c0c0e;
        --surface: #16161a;
        --surface2: #1e1e24;
        --border: #2a2a32;
        --text: #eaeaea;
        --text-dim: #8a8a96;
        --la: #4e8ef7;
        --lg: rgba(78, 142, 247, 0.15);
        --ca: #e8637a;
        --cg: rgba(232, 99, 122, 0.15);
        --accent: var(--la);
        --glow: var(--lg);
        --green: #34d399;
        --yellow: #fbbf24;
        --yt: #ff0000;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html {
        font-size: 16px;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .splash {
        position: fixed;
        inset: 0;
        z-index: 1000;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        animation: splashOut 0.5s ease 1.8s forwards;
      }
      .splash h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        letter-spacing: 0.15em;
        background: linear-gradient(135deg, var(--la), var(--ca));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: pulseIn 0.6s ease;
      }
      .splash .bar {
        width: 120px;
        height: 3px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .splash .bar::after {
        content: "";
        display: block;
        height: 100%;
        width: 0;
        background: linear-gradient(90deg, var(--la), var(--ca));
        animation: load 1.6s ease forwards;
      }
      @keyframes load {
        to {
          width: 100%;
        }
      }
      @keyframes pulseIn {
        from {
          opacity: 0;
          transform: scale(0.8);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      @keyframes splashOut {
        to {
          opacity: 0;
          pointer-events: none;
        }
      }

      .profile-selector {
        display: flex;
        width: 100%;
        position: sticky;
        top: 0;
        z-index: 100;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .profile-tab {
        flex: 1;
        padding: 1rem 0.5rem;
        text-align: center;
        font-weight: 600;
        font-size: 0.95rem;
        cursor: pointer;
        transition: all 0.3s;
        border: none;
        border-bottom: 3px solid transparent;
        color: var(--text-dim);
        background: transparent;
        font-family: "DM Sans", sans-serif;
      }
      .profile-tab.active[data-profile="laurent"] {
        color: var(--la);
        border-bottom-color: var(--la);
        background: var(--lg);
      }
      .profile-tab.active[data-profile="chamsia"] {
        color: var(--ca);
        border-bottom-color: var(--ca);
        background: var(--cg);
      }
      .profile-tab .tab-icon {
        font-size: 1.2rem;
        display: block;
        margin-bottom: 2px;
      }

      .app {
        display: none;
        padding-bottom: 5rem;
      }
      .app.active {
        display: block;
      }

      .hero {
        padding: 2rem 1.25rem 1.5rem;
        position: relative;
        overflow: hidden;
      }
      .hero::before {
        content: "";
        position: absolute;
        top: -50%;
        right: -30%;
        width: 250px;
        height: 250px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.06;
        filter: blur(60px);
      }
      .hero-label {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 0.5rem;
      }
      .hero h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.4rem;
        letter-spacing: 0.05em;
        line-height: 1.1;
      }
      .hero-stats {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
        flex-wrap: wrap;
      }
      .hero-stat {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 0.6rem 0.9rem;
        font-size: 0.8rem;
        color: var(--text-dim);
      }
      .hero-stat strong {
        color: var(--text);
        font-weight: 600;
      }

      .phase-selector {
        display: flex;
        gap: 0.5rem;
        padding: 0 1.25rem;
        margin-bottom: 1.25rem;
      }
      .phase-btn {
        flex: 1;
        padding: 0.7rem;
        border-radius: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--text-dim);
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.25s;
        font-family: "DM Sans", sans-serif;
        text-align: center;
      }
      .phase-btn.active {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        box-shadow: 0 4px 20px var(--glow);
      }
      .phase-btn .phase-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 400;
        opacity: 0.8;
        margin-top: 2px;
      }

      .day-card {
        margin: 0 1rem 1rem;
        border-radius: 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        overflow: hidden;
        animation: fadeUp 0.4s ease both;
      }
      .day-card:nth-child(2) {
        animation-delay: 0.08s;
      }
      .day-card:nth-child(3) {
        animation-delay: 0.16s;
      }
      .day-header {
        padding: 1rem 1.1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        user-select: none;
      }
      .day-header h3 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.35rem;
        letter-spacing: 0.04em;
      }
      .day-header .day-tag {
        font-size: 0.68rem;
        font-weight: 600;
        padding: 0.25rem 0.6rem;
        border-radius: 6px;
        background: var(--glow);
        color: var(--accent);
      }
      .day-chevron {
        transition: transform 0.3s;
        font-size: 1.2rem;
        color: var(--text-dim);
      }
      .day-card.open .day-chevron {
        transform: rotate(180deg);
      }
      .day-body {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
      }
      .day-card.open .day-body {
        max-height: 8000px;
      }

      .exercise {
        padding: 0.9rem 1.1rem;
        border-top: 1px solid var(--border);
        position: relative;
        transition: background 0.2s;
      }
      .exercise.done {
        opacity: 0.35;
      }
      .exercise.done .ex-check {
        display: flex;
      }
      .ex-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      .ex-left {
        flex: 1;
        cursor: pointer;
      }
      .exercise-name {
        font-weight: 700;
        font-size: 1rem;
        line-height: 1.3;
        margin-bottom: 0.35rem;
      }
      .exercise-details {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
        margin-bottom: 0.3rem;
      }
      .exercise-chip {
        font-size: 0.73rem;
        font-weight: 500;
        padding: 0.2rem 0.5rem;
        border-radius: 6px;
        background: var(--surface2);
        color: var(--text-dim);
        white-space: nowrap;
      }
      .exercise-chip.sets {
        color: var(--accent);
        background: var(--glow);
      }
      .exercise-note {
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.4;
        margin-top: 0.25rem;
        padding-right: 0.5rem;
      }
      .ex-check {
        display: none;
        position: absolute;
        right: 0.8rem;
        top: 0.8rem;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--green);
        color: #000;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 700;
      }

      .yt-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.45rem 0.7rem;
        border-radius: 8px;
        background: #1a1a22;
        border: 1px solid #333;
        color: #fff;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .yt-btn:hover,
      .yt-btn:active {
        background: #2a1a1a;
        border-color: var(--yt);
      }
      .yt-btn svg {
        width: 18px;
        height: 18px;
      }

      .video-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 0.45rem 0.7rem;
        border-radius: 8px;
        background: rgba(78, 142, 247, 0.12);
        border: 1px solid rgba(78, 142, 247, 0.3);
        color: #fff;
        font-size: 0.75rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        font-family: "DM Sans", sans-serif;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .video-btn:hover,
      .video-btn:active {
        background: rgba(78, 142, 247, 0.25);
        border-color: var(--accent);
      }
      .video-btn.active {
        background: rgba(78, 142, 247, 0.25);
        border-color: var(--accent);
      }
      .ex-video-wrap {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.4s ease;
        margin-top: 0;
      }
      .ex-video-wrap.open {
        max-height: 500px;
        margin-top: 0.6rem;
      }
      .ex-video-wrap video {
        width: 100%;
        max-height: 400px;
        border-radius: 10px;
        background: #000;
        object-fit: contain;
      }
      .ex-btns {
        display: flex;
        gap: 0.4rem;
        flex-shrink: 0;
      }
      .ex-timer {
        display: flex;
        gap: 0.35rem;
        margin-top: 0.5rem;
        flex-wrap: wrap;
      }
      .ex-timer .rest-btn {
        font-size: 0.72rem;
        padding: 0.3rem 0.6rem;
      }

      .info-section {
        margin: 1.25rem 1rem;
        padding: 1.1rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
      }
      .info-section h3 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.3rem;
        letter-spacing: 0.04em;
        margin-bottom: 0.75rem;
        color: var(--accent);
      }
      .info-section p {
        font-size: 0.88rem;
        line-height: 1.6;
        color: var(--text-dim);
        margin-bottom: 0.6rem;
      }
      .info-section strong {
        color: var(--text);
      }
      .macro-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      .macro-item {
        background: var(--surface2);
        border-radius: 10px;
        padding: 0.75rem;
        text-align: center;
      }
      .macro-item .macro-val {
        font-family: "Bebas Neue", sans-serif;
        font-size: 1.5rem;
        color: var(--accent);
      }
      .macro-item .macro-label {
        font-size: 0.72rem;
        color: var(--text-dim);
        margin-top: 2px;
      }

      .rest-timers {
        display: flex;
        gap: 0.4rem;
        padding: 0.7rem 1.1rem;
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
      }
      .rest-btn {
        padding: 0.4rem 0.7rem;
        border-radius: 8px;
        font-size: 0.75rem;
        background: var(--surface2);
        color: var(--text-dim);
        border: 1px solid var(--border);
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-weight: 500;
        transition: all 0.2s;
      }
      .rest-btn:active {
        background: var(--accent);
        color: #fff;
      }

      .timer-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--surface);
        border-top: 1px solid var(--border);
        padding: 0.75rem 1.25rem;
        display: flex;
        align-items: center;
        gap: 1rem;
        z-index: 200;
        backdrop-filter: blur(10px);
        transform: translateY(100%);
        transition: transform 0.3s ease;
      }
      .timer-bar.visible {
        transform: translateY(0);
      }
      .timer-display {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2.2rem;
        min-width: 80px;
        text-align: center;
        letter-spacing: 0.05em;
      }
      .timer-display.warning {
        color: var(--yellow);
      }
      .timer-display.done {
        color: var(--green);
      }
      .timer-btns {
        display: flex;
        gap: 0.5rem;
        flex: 1;
        justify-content: flex-end;
      }
      .timer-btn {
        padding: 0.6rem 1rem;
        border-radius: 10px;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        font-family: "DM Sans", sans-serif;
        transition: all 0.2s;
      }
      .timer-btn.secondary {
        background: var(--surface2);
        color: var(--text-dim);
        border: 1px solid var(--border);
      }
      .timer-label {
        font-size: 0.7rem;
        color: var(--text-dim);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      ::-webkit-scrollbar {
        width: 0;
      }
      @media (max-width: 500px) {
        .timer-bar {
          padding: 0.6rem 1rem 1.4rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <h1>GYM PROGRAM</h1>
      <div class="bar"></div>
    </div>

    <nav class="profile-selector">
      <button
        class="profile-tab active"
        data-profile="laurent"
        onclick="switchProfile('laurent')"
      >
        <span class="tab-icon">🏋️</span> Laurent
      </button>
      <button
        class="profile-tab"
        data-profile="chamsia"
        onclick="switchProfile('chamsia')"
      >
        <span class="tab-icon">💪</span> Chamsia
      </button>
    </nav>

    <div class="app active" id="app-laurent"></div>
    <div class="app" id="app-chamsia"></div>

    <div class="timer-bar" id="timer-bar">
      <div>
        <div class="timer-label">REPOS</div>
        <div class="timer-display" id="timer-display">0:00</div>
      </div>
      <div class="timer-btns">
        <button class="timer-btn secondary" onclick="addTime(15)">+15s</button>
        <button class="timer-btn secondary" onclick="stopTimer()">✕</button>
      </div>
    </div>

    <script>
      const ytIcon = `<svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="4" fill="#FF0000"/><path d="M10 8.5v7l6-3.5-6-3.5z" fill="white"/></svg>`;

      const V = {
        squat_goblet: "goblet+squat+dumbbell+tutorial",
        back_squat: "barbell+back+squat+tutorial+form",
        front_squat: "barbell+front+squat+tutorial",
        sumo_squat: "sumo+squat+dumbbell+tutorial",
        squat_bulgare: "bulgarian+split+squat+tutorial",
        fentes: "walking+lunges+dumbbell+tutorial",
        fentes_arriere: "reverse+lunges+tutorial",
        dev_couche: "dumbbell+bench+press+tutorial",
        dev_incline: "incline+dumbbell+press+tutorial",
        rowing_haltere: "one+arm+dumbbell+row+tutorial",
        rowing_barre: "barbell+row+tutorial+form",
        dev_epaules: "dumbbell+shoulder+press+tutorial",
        chest_press: "machine+chest+press+tutorial",
        curl: "bicep+curl+dumbbell+tutorial",
        curl_marteau: "hammer+curl+tutorial",
        ext_triceps: "tricep+pushdown+cable+tutorial",
        skull_crusher: "skull+crusher+tutorial",
        ext_triceps_tete: "overhead+tricep+extension+tutorial",
        rdl: "romanian+deadlift+dumbbell+tutorial",
        deadlift: "conventional+deadlift+tutorial",
        leg_press: "leg+press+machine+tutorial",
        tirage_vertical: "lat+pulldown+tutorial",
        tractions: "pull+up+chin+up+tutorial",
        elev_lat: "lateral+raise+dumbbell+tutorial",
        face_pull: "face+pull+cable+tutorial",
        planche: "plank+exercise+form+tutorial",
        planche_laterale: "side+plank+tutorial+form",
        hip_thrust: "hip+thrust+barbell+tutorial",
        dips: "parallel+bar+dips+tutorial",
        crunchs_cable: "cable+crunch+tutorial",
        releves_jambes: "hanging+leg+raise+tutorial",
        ab_wheel: "ab+wheel+rollout+tutorial",
        dead_bug: "dead+bug+exercise+tutorial",
        bird_dog: "bird+dog+exercise+tutorial",
        vacuum: "stomach+vacuum+exercise+tutorial",
        hypopressive: "hypopressive+exercise+tutorial+postpartum",
        pallof: "pallof+press+cable+band+tutorial",
        pompes_inclinees: "incline+push+up+tutorial",
        step_up: "dumbbell+step+up+tutorial",
        pont_fessier: "single+leg+glute+bridge+tutorial",
        leg_curl: "lying+leg+curl+machine+tutorial",
        abducteurs: "hip+abduction+machine+tutorial",
        mountain_climbers: "slow+mountain+climbers+tutorial",
        circuit_abdos: "ab+circuit+dead+bug+plank+vacuum",
      };

      function ytUrl(key) {
        return `https://www.youtube.com/results?search_query=${V[key] || key}`;
      }
      function ytBtn(key) {
        return `<a class="yt-btn" href="${ytUrl(key)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${ytIcon}</a>`;
      }
      function videoBtn() {
        return `<button class="video-btn" onclick="event.stopPropagation();toggleVideo(this)">▶ Vidéo</button>`;
      }
      function videoWrap(key) {
        return `<div class="ex-video-wrap"><video src="video/${key}.mp4" playsinline preload="none" controls loop muted></video></div>`;
      }
      function parseRest(rest) {
        if (!rest) return [];
        // "2-3min" → [120, 180], "90s" → [90], "2min" → [120], "75s" → [75], "45s" → [45]
        const m = rest.match(/(\d+)\s*-\s*(\d+)\s*min/);
        if (m) return [parseInt(m[1]) * 60, parseInt(m[2]) * 60];
        const m2 = rest.match(/(\d+)\s*min/);
        if (m2) return [parseInt(m2[1]) * 60];
        const m3 = rest.match(/(\d+)\s*s/);
        if (m3) return [parseInt(m3[1])];
        return [];
      }
      function exTimerBtns(rest) {
        const secs = parseRest(rest);
        if (!secs.length) return '';
        let btns = '';
        secs.forEach(t => {
          const l = t >= 120 ? `${t/60}min` : t >= 60 ? `${Math.floor(t/60)}m${t%60||''}`.replace(/m$/,'min') : `${t}s`;
          btns += `<button class="rest-btn" onclick="startTimer(${t},event)">⏱ ${l}</button>`;
        });
        return `<div class="ex-timer">${btns}</div>`;
      }
      function toggleVideo(btn) {
        const wrap = btn.closest('.exercise').querySelector('.ex-video-wrap');
        const video = wrap.querySelector('video');
        const isOpen = wrap.classList.toggle('open');
        btn.classList.toggle('active', isOpen);
        if (isOpen) {
          video.play();
        } else {
          video.pause();
          video.currentTime = 0;
        }
      }

      const LP1 = {
        days: [
          {
            title: "Jour A — Accent Poussée",
            timers: [60, 90, 120],
            exercises: [
              {
                name: "Squat goblet (haltère)",
                sets: "3 × 10-12",
                rest: "90s",
                tempo: "3-1-1-0",
                img: "squat_goblet",
                note: "Debout, tiens un haltère contre ta poitrine à deux mains. Descends en pliant les genoux jusqu'à ce que tes cuisses soient parallèles au sol, puis remonte en poussant sur les talons.",
              },
              {
                name: "Développé couché haltères",
                sets: "3 × 10-12",
                rest: "90s",
                tempo: "3-0-1-0",
                img: "dev_couche",
                note: "Allongé sur un banc plat, un haltère dans chaque main au niveau de la poitrine. Pousse les haltères vers le haut jusqu'à tendre les bras, puis redescends lentement.",
              },
              {
                name: "Rowing haltère 1 bras",
                sets: "3 × 10-12",
                rest: "90s",
                tempo: "2-1-1-0",
                img: "rowing_haltere",
                note: "Un genou et une main sur le banc, l'autre main tient un haltère. Tire l'haltère vers ta hanche en serrant l'omoplate, puis redescends lentement.",

              },

      };

      function renderApp(id, phases, hero, nutri) {
        const c = document.getElementById(id);
        let h = hero;
        h += `<div class="phase-selector"><button class="phase-btn active" onclick="switchPhase('${id}',1,this)">Phase 1<span class="phase-label">${phases[0].l}</span></button><button class="phase-btn" onclick="switchPhase('${id}',2,this)">Phase 2<span class="phase-label">${phases[1].l}</span></button></div>`;
        phases.forEach((p, pi) => {
          h += `<div class="phase-content" id="${id}-phase-${pi + 1}" style="${pi > 0 ? "display:none" : ""}">`;
          p.d.days.forEach((day, di) => {
            h += `<div class="day-card${di === 0 ? " open" : ""}" data-day><div class="day-header" onclick="toggleDay(this)"><div><h3>${day.title}</h3><span class="day-tag">${day.exercises.length} exercices</span></div><span class="day-chevron">▾</span></div><div class="day-body">`;
            day.exercises.forEach((ex) => {
              h += `<div class="exercise"><div class="ex-top"><div class="ex-left" onclick="toggleDone(this.closest('.exercise'))"><div class="exercise-name">${ex.name}</div><div class="exercise-details"><span class="exercise-chip sets">${ex.sets}</span><span class="exercise-chip">${ex.rest} repos</span>${ex.tempo ? `<span class="exercise-chip">${ex.tempo}</span>` : ""}</div></div><div class="ex-btns">${videoBtn()}${ytBtn(ex.img)}</div></div><div class="exercise-note" onclick="toggleDone(this.closest('.exercise'))">${ex.note}</div>${videoWrap(ex.img)}${exTimerBtns(ex.rest)}<div class="ex-check">✓</div></div>`;
            });
            h += `</div></div>`;
          });
          h += `</div>`;
        });
        h += nutri;
        c.innerHTML = h;
      }

      renderApp(
        "app-laurent",
        [
          { l: "Ré-adaptation", d: LP1 },
          { l: "Hypertrophie", d: LP2 },
        ],
        `<div class="hero"><div class="hero-label">Programme de Laurent</div><h2>Reprise &<br>Prise de Masse</h2><div class="hero-stats"><div class="hero-stat"><strong>3x</strong> / semaine</div><div class="hero-stat"><strong>12</strong> semaines</div><div class="hero-stat"><strong>Full Body</strong></div></div></div>`,
        `<div class="info-section"><h3>📊 Nutrition — Prise de Masse</h3><div class="macro-grid"><div class="macro-item"><div class="macro-val">+300</div><div class="macro-label">kcal surplus / jour</div></div><div class="macro-item"><div class="macro-val">1.8-2.2g</div><div class="macro-label">protéines / kg</div></div><div class="macro-item"><div class="macro-val">0.8-1.2g</div><div class="macro-label">lipides / kg</div></div><div class="macro-item"><div class="macro-val">3L+</div><div class="macro-label">eau / jour</div></div></div></div><div class="info-section"><h3>💡 Tempo</h3><p><strong>Format : X-X-X-X</strong> = descente – pause bas – montée – pause haut</p><p>Ex: <strong>3-1-1-0</strong> = 3s descente, 1s pause, 1s montée, 0s pause</p></div>`,
      );

      renderApp(
        "app-chamsia",
        [
          { l: "Reconnexion", d: CP1 },
          { l: "Intensification", d: CP2 },
        ],
        `<div class="hero"><div class="hero-label">Programme de Chamsia</div><h2>Perte de Poids &<br>Tonification</h2><div class="hero-stats"><div class="hero-stat"><strong>3x</strong> / semaine</div><div class="hero-stat"><strong>59→52</strong> kg</div><div class="hero-stat"><strong>12</strong> semaines</div></div></div>`,
        `<div class="info-section"><h3>📊 Nutrition — Perte de Poids</h3><p>Objectif : <strong>1 400 - 1 500 kcal / jour</strong> (déficit ~400-500 kcal)</p><div class="macro-grid"><div class="macro-item"><div class="macro-val">95-115g</div><div class="macro-label">protéines / jour</div></div><div class="macro-item"><div class="macro-val">50-60g</div><div class="macro-label">lipides / jour</div></div><div class="macro-item"><div class="macro-val">130-160g</div><div class="macro-label">glucides / jour</div></div><div class="macro-item"><div class="macro-val">2.5L</div><div class="macro-label">eau / jour</div></div></div></div><div class="info-section"><h3>🎯 Exercices ventre</h3><p>Les exercices marqués 🎯 ciblent le <strong>transverse</strong> et la gaine profonde post-grossesse. Ne les saute jamais !</p></div>`,
      );

      let timerInterval = null,
        timerSeconds = 0;
      function switchProfile(p) {
        document
          .querySelectorAll(".profile-tab")
          .forEach((t) => t.classList.remove("active"));
        document
          .querySelector(`.profile-tab[data-profile="${p}"]`)
          .classList.add("active");
        document
          .querySelectorAll(".app")
          .forEach((a) => a.classList.remove("active"));
        document.getElementById(`app-${p}`).classList.add("active");
        const r = document.documentElement.style;
        if (p === "laurent") {
          r.setProperty("--accent", "var(--la)");
          r.setProperty("--glow", "var(--lg)");
        } else {
          r.setProperty("--accent", "var(--ca)");
          r.setProperty("--glow", "var(--cg)");
        }
      }
      function switchPhase(id, phase, btn) {
        const app = document.getElementById(id);
        app
          .querySelectorAll(".phase-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        app
          .querySelectorAll(".phase-content")
          .forEach((pc) => (pc.style.display = "none"));
        document.getElementById(`${id}-phase-${phase}`).style.display = "block";
      }
      function toggleDay(h) {
        h.closest(".day-card").classList.toggle("open");
      }
      function toggleDone(el) {
        if (!el || el.closest(".rest-timers")) return;
        el.classList.toggle("done");
      }

      // Audio beep using Web Audio API (works on iOS)
      let audioCtx;
      function playBeep() {
        try {
          if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = 880;
          gain.gain.value = 0.3;
          osc.start();
          osc.stop(audioCtx.currentTime + 0.15);
          setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.value = 1100;
            gain2.gain.value = 0.3;
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.2);
          }, 200);
          setTimeout(() => {
            const osc3 = audioCtx.createOscillator();
            const gain3 = audioCtx.createGain();
            osc3.connect(gain3);
            gain3.connect(audioCtx.destination);
            osc3.frequency.value = 1320;
            gain3.gain.value = 0.3;
            osc3.start();
            osc3.stop(audioCtx.currentTime + 0.3);
          }, 450);
        } catch(e) {}
      }

      // Wake lock to keep screen on during timer
      let wakeLock = null;
      async function requestWakeLock() {
        try {
          if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
          }
        } catch(e) {}
      }
      function releaseWakeLock() {
        if (wakeLock) { wakeLock.release(); wakeLock = null; }
      }

      // Request notification permission on first timer use
      let notifAsked = false;
      function askNotif() {
        if (notifAsked) return;
        notifAsked = true;
        if ('Notification' in window && Notification.permission === 'default') {
          Notification.requestPermission();
        }
      }
      function sendNotif() {
        if ('Notification' in window && Notification.permission === 'granted') {
          new Notification('Repos terminé !', { body: 'C\'est reparti 💪', icon: 'icon-192.png' });
        }
      }

      function timerDone() {
        document.getElementById("timer-display").classList.add("done");
        if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
        playBeep();
        sendNotif();
        releaseWakeLock();
      }

      function startTimer(s, e) {
        if (e) e.stopPropagation();
        clearInterval(timerInterval);
        timerSeconds = s;
        updT();
        document.getElementById("timer-bar").classList.add("visible");
        // Unlock audio on iOS (requires user gesture)
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        askNotif();
        requestWakeLock();
        timerInterval = setInterval(() => {
          timerSeconds--;
          updT();
          if (timerSeconds <= 0) {
            clearInterval(timerInterval);
            timerDone();
          }
        }, 1000);
      }
      function addTime(s) {
        timerSeconds += s;
        updT();
        document.getElementById("timer-display").classList.remove("done");
        if (!timerInterval || timerSeconds > s) return;
        requestWakeLock();
        timerInterval = setInterval(() => {
          timerSeconds--;
          updT();
          if (timerSeconds <= 0) {
            clearInterval(timerInterval);
            timerDone();
          }
        }, 1000);
      }
      function stopTimer() {
        clearInterval(timerInterval);
        timerInterval = null;
        document.getElementById("timer-bar").classList.remove("visible");
        document
          .getElementById("timer-display")
          .classList.remove("done", "warning");
        releaseWakeLock();
      }
      function updT() {
        const d = document.getElementById("timer-display"),
          m = Math.floor(Math.abs(timerSeconds) / 60),
          s = Math.abs(timerSeconds) % 60;
        d.textContent = `${timerSeconds < 0 ? "-" : ""}${m}:${s.toString().padStart(2, "0")}`;
        d.classList.remove("warning", "done");
        if (timerSeconds <= 5 && timerSeconds > 0) d.classList.add("warning");
        if (timerSeconds <= 0) d.classList.add("done");
      }
      setTimeout(() => {
        const sp = document.querySelector(".splash");
        if (sp) sp.remove();
      }, 2500);

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
